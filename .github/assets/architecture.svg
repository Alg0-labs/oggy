<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="16" fill="#12101f"/>
  <text x="40" y="52" font-size="26" font-weight="bold" fill="#ffffff">Generation pipeline</text>

  <!-- Row 1: prompt -> useGeneration -> provider factory -> LLM -->
  <g>
    <rect x="40" y="90" width="200" height="80" rx="12" fill="#262047" stroke="#3b3266"/>
    <text x="60" y="124" font-size="16" fill="#ffffff" font-weight="bold">Prompt</text>
    <text x="60" y="148" font-size="13" fill="#9a93c9">"Build a tip calculator"</text>

    <rect x="300" y="90" width="220" height="80" rx="12" fill="#262047" stroke="#3b3266"/>
    <text x="320" y="118" font-size="16" fill="#ffffff" font-weight="bold">useGeneration hook</text>
    <text x="320" y="140" font-size="13" fill="#9a93c9">provider from Zustand store</text>
    <text x="320" y="158" font-size="13" fill="#9a93c9">key from Keychain</text>

    <rect x="580" y="90" width="230" height="80" rx="12" fill="#262047" stroke="#3b3266"/>
    <text x="600" y="118" font-size="16" fill="#ffffff" font-weight="bold">createLLMService()</text>
    <text x="600" y="140" font-size="13" fill="#9a93c9">provider factory</text>
    <text x="600" y="158" font-size="13" fill="#9a93c9">per-provider auth strategy</text>

    <rect x="870" y="90" width="290" height="80" rx="12" fill="#1d2a3f" stroke="#2e4265"/>
    <text x="890" y="118" font-size="16" fill="#ffffff" font-weight="bold">LLM Provider</text>
    <text x="890" y="140" font-size="13" fill="#9ab4d9">OpenAI GPT-4 · Gemini 2.0 Flash</text>
    <text x="890" y="158" font-size="13" fill="#9ab4d9">Claude Sonnet → JSX string</text>
  </g>

  <line x1="240" y1="130" x2="295" y2="130" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="130" x2="575" y2="130" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="810" y1="130" x2="865" y2="130" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- down arrow -->
  <path d="M 1015 170 L 1015 215 L 625 215 L 625 255" fill="none" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Row 2: executor pipeline -->
  <rect x="40" y="260" width="1120" height="150" rx="14" fill="#191531" stroke="#3b3266"/>
  <text x="64" y="292" font-size="17" font-weight="bold" fill="#e9e6ff">JSX Executor pipeline (sandboxed)</text>

  <g>
    <rect x="64" y="310" width="330" height="80" rx="10" fill="#262047" stroke="#3b3266"/>
    <text x="84" y="338" font-size="15" fill="#ffffff" font-weight="bold">1 · Validator</text>
    <text x="84" y="360" font-size="12.5" fill="#9a93c9">blocks eval, fetch, require, import,</text>
    <text x="84" y="377" font-size="12.5" fill="#9a93c9">NativeModules, Function constructor</text>

    <rect x="444" y="310" width="300" height="80" rx="10" fill="#262047" stroke="#3b3266"/>
    <text x="464" y="338" font-size="15" fill="#ffffff" font-weight="bold">2 · Transformer</text>
    <text x="464" y="360" font-size="12.5" fill="#9a93c9">@babel/standalone compiles</text>
    <text x="464" y="377" font-size="12.5" fill="#9a93c9">JSX → JS on-device</text>

    <rect x="794" y="310" width="330" height="80" rx="10" fill="#262047" stroke="#3b3266"/>
    <text x="814" y="338" font-size="15" fill="#ffffff" font-weight="bold">3 · Executor</text>
    <text x="814" y="360" font-size="12.5" fill="#9a93c9">new Function() with whitelisted</text>
    <text x="814" y="377" font-size="12.5" fill="#9a93c9">RN components + hooks only</text>
  </g>

  <line x1="394" y1="350" x2="439" y2="350" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="744" y1="350" x2="789" y2="350" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- down to render -->
  <path d="M 600 410 L 600 445" fill="none" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Row 3: render + persistence -->
  <rect x="330" y="450" width="540" height="70" rx="12" fill="#241b4d" stroke="url(#accent)" stroke-width="2"/>
  <text x="356" y="480" font-size="16" font-weight="bold" fill="#ffffff">DynamicJSXExecutor renders the mini-app natively</text>
  <text x="356" y="502" font-size="13" fill="#c7c2e8">saved to local gallery · Zustand + AsyncStorage persistence</text>
</svg>
